---
- name: Bring up Kong API Gateway (Postgres-backed)
  hosts: kong
  become: true
  vars:
    kong_image: "kong:3.6"
  tasks:
    - name: Ensure Docker present
      apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Kong DB migrations bootstrap (once)
      run_once: true
      shell: >
        docker run --rm
        -e KONG_DATABASE=postgres -e KONG_PG_HOST={{ pg_host }} -e KONG_PG_PORT=6432
        -e KONG_PG_USER=kong_user -e KONG_PG_PASSWORD={{ kong_pw }} -e KONG_PG_DATABASE=kong
        -e KONG_PG_SSL=off
        {{ kong_image }} kong migrations bootstrap
      register: kb
      changed_when: kb.rc == 0
      failed_when: kb.rc != 0 and ("already" not in kb.stderr | lower)

    - name: Stop any previous Kong
      shell: docker stop kong ; docker container prune -f
      ignore_errors: true

    - name: Run Kong container
      shell: >
        docker run -d --name kong --restart always
        -e KONG_DATABASE=postgres -e KONG_PG_HOST={{ pg_host }} -e KONG_PG_PORT=6432
        -e KONG_PG_USER=kong_user -e KONG_PG_PASSWORD={{ kong_pw }} -e KONG_PG_DATABASE=kong
        -e KONG_PG_SSL=off
        -e KONG_PROXY_LISTEN=0.0.0.0:8000 -e KONG_ADMIN_LISTEN=0.0.0.0:8001
        -p 8000:8000 -p 8001:8001
        {{ kong_image }}

    - name: Wait for Kong admin API
      shell: curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/status
      register: kc
      until: kc.stdout == "200"
      retries: 20
      delay: 3
