# LOCAL development / reference only.
#
# Mirrors the production microservice topology (gateway → 5 services → shared
# Postgres + Redis), but with LOCAL Postgres/Redis containers and an nginx
# gateway standing in for Kong. In Yandex Cloud, Postgres/Redis are MANAGED
# services and Kong is the gateway; the per-service images here are the same
# ones Ansible builds and runs on the backend instance group.
#
# Usage:  cp .env.example .env  &&  docker compose up --build
version: '3.9'

x-service: &service
  build:
    context: .
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    migrate:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
  volumes:
    - uploads_data:/app/uploads
  networks:
    - marketplace_net

services:
  db:
    image: postgres:17-alpine
    container_name: marketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-marketplace}
      POSTGRES_USER: ${DB_USER:-marketplace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marketplace_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-marketplace} -d ${DB_NAME:-marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace_net

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace_net

  # One-shot: run Alembic migrations on the shared DB, then seed defaults.
  # All services wait for this to finish before starting.
  migrate:
    build:
      context: .
      dockerfile: services/identity/Dockerfile
    container_name: marketplace_migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - "/app/entrypoint.sh migrate && /app/entrypoint.sh seed"
    restart: "no"
    networks:
      - marketplace_net

  identity:
    <<: *service
    build:
      context: .
      dockerfile: services/identity/Dockerfile
    container_name: marketplace_identity

  catalog:
    <<: *service
    build:
      context: .
      dockerfile: services/catalog/Dockerfile
    container_name: marketplace_catalog

  orders:
    <<: *service
    build:
      context: .
      dockerfile: services/orders/Dockerfile
    container_name: marketplace_orders

  sellers:
    <<: *service
    build:
      context: .
      dockerfile: services/sellers/Dockerfile
    container_name: marketplace_sellers

  platform:
    <<: *service
    build:
      context: .
      dockerfile: services/platform/Dockerfile
    container_name: marketplace_platform

  worker:
    <<: *service
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: marketplace_worker
    command: ["worker"]

  beat:
    <<: *service
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: marketplace_beat
    command: ["beat"]

  gateway:
    image: nginx:1.27-alpine
    container_name: marketplace_gateway
    restart: unless-stopped
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:8000"
    depends_on:
      - identity
      - catalog
      - orders
      - sellers
      - platform
    networks:
      - marketplace_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: marketplace_frontend
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - marketplace_net

volumes:
  postgres_data:
  uploads_data:

networks:
  marketplace_net:
    driver: bridge
