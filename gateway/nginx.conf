# Local API gateway — mirrors the Kong path routing used in production.
# Each /api/v1/<prefix> is owned by exactly one service (see STAGE2_PLAN.md §3
# and the route table in infra/README). nginx selects the LONGEST matching
# prefix location, so /api/v1/seller/sub-orders wins over /api/v1/seller/.

upstream identity { server identity:8000; }
upstream catalog  { server catalog:8000; }
upstream orders   { server orders:8000; }
upstream sellers  { server sellers:8000; }
upstream platform { server platform:8000; }

server {
    listen 8000;
    server_name _;
    client_max_body_size 25m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── identity ──────────────────────────────────────────────
    location /api/v1/auth  { proxy_pass http://identity; }
    location /api/v1/users { proxy_pass http://identity; }
    location /api/v1/2fa   { proxy_pass http://identity; }

    # ── catalog ───────────────────────────────────────────────
    location /api/v1/products        { proxy_pass http://catalog; }
    location /api/v1/shops           { proxy_pass http://catalog; }
    location /api/v1/reviews         { proxy_pass http://catalog; }
    location /api/v1/categories      { proxy_pass http://catalog; }
    location /api/v1/variants        { proxy_pass http://catalog; }
    location /api/v1/attributes      { proxy_pass http://catalog; }
    location /api/v1/questions       { proxy_pass http://catalog; }
    location /api/v1/home            { proxy_pass http://catalog; }
    location /api/v1/recommendations { proxy_pass http://catalog; }
    location /api/v1/favorites       { proxy_pass http://catalog; }
    location /api/v1/catalog         { proxy_pass http://catalog; }
    location /api/v1/sitemap.xml     { proxy_pass http://catalog; }
    location /uploads                { proxy_pass http://catalog; }

    # ── orders ────────────────────────────────────────────────
    location /api/v1/cart                  { proxy_pass http://orders; }
    location /api/v1/orders                { proxy_pass http://orders; }
    location /api/v1/returns               { proxy_pass http://orders; }
    location /api/v1/sub-orders            { proxy_pass http://orders; }
    location /api/v1/product-subscriptions { proxy_pass http://orders; }
    location /api/v1/disputes              { proxy_pass http://orders; }
    location /api/v1/addresses             { proxy_pass http://orders; }
    location /api/v1/wishlists             { proxy_pass http://orders; }
    location /api/v1/recently-viewed       { proxy_pass http://orders; }
    location /api/v1/library               { proxy_pass http://orders; }
    location /api/v1/delivery              { proxy_pass http://orders; }
    # Seller-facing fulfillment view (more specific than /api/v1/seller).
    location /api/v1/seller/sub-orders     { proxy_pass http://orders; }

    # ── sellers ───────────────────────────────────────────────
    location /api/v1/seller       { proxy_pass http://sellers; }
    location /api/v1/subscription { proxy_pass http://sellers; }
    location /api/v1/promotions   { proxy_pass http://sellers; }
    location /api/v1/upload       { proxy_pass http://sellers; }

    # ── platform ──────────────────────────────────────────────
    location /api/v1/notifications     { proxy_pass http://platform; }
    location /api/v1/chat              { proxy_pass http://platform; }
    location /api/v1/support           { proxy_pass http://platform; }
    location /api/v1/gift-certificates { proxy_pass http://platform; }
    location /api/v1/loyalty           { proxy_pass http://platform; }
    location /api/v1/currencies        { proxy_pass http://platform; }
    location /api/v1/reports           { proxy_pass http://platform; }
    location /api/v1/admin             { proxy_pass http://platform; }

    # Gateway health
    location = /health { return 200 '{"status":"ok","gateway":"nginx"}'; add_header Content-Type application/json; }
}
